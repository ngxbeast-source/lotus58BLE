# Uncomment the following line to enable the Lotus58 OLED Display
CONFIG_ZMK_DISPLAY=y

# Uncomment these two lines to add support for encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

## MY OWN ADDITIONS
#OLED
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
#CONFIG_ZMK_WIDGET_WPM_STATUS=n
#CONFIG_ZMK_WIDGET_LAYER_STATUS=n
#CONFIG_ZMK_WIDGET_PERIPHERAL_STATUS=n
#CONFIG_ZMK_WIDGET_BONGO_CAT=y

#Studio Unlock
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n

## Bluetooth configuration
CONFIG_BT=y
CONFIG_BT_BAS=y
CONFIG_ZMK_BLE=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Lotus58"
#CONFIG_BT_DEVICE_APPEARANCE=961
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n
#7.5ms BLE polling config
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
# Increase Bluetooth signal power
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_USB_HID_POLL_INTERVAL_MS=1
# Mouse configuration
CONFIG_ZMK_POINTING=y
#CONFIG_ZMK_MOUSE=y

CONFIG_ZMK_SETTINGS_RESET_ON_START=n

# Enable deep sleep support
CONFIG_ZMK_SLEEP=y
#25 minute idle sleep timeout
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1500000
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

#CONFIG_ZMK_USB=y
#CONFIG_SERIAL=y
#CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_USB_DEVICE_PRODUCT="Lotus58"

# Debounce configuration
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=0
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=1

# RGB 
# Enable RGB underglow and layer effects
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
#CONFIG_PWM=y
# Set RGB startup options
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y

#CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=75
#CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=n

#CONFIG_ZMK_RGB_UNDERGLOW_HUE_STEP=16
#CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=8
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=60